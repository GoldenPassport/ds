name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Re-scan weekly so newly-disclosed CVEs surface even without a code push
  schedule:
    - cron: '0 7 * * 1'   # 07:00 UTC every Monday

permissions:
  contents: read

jobs:
  # ── 1. pnpm audit ────────────────────────────────────────────────────────────
  # Checks every installed package (including devDependencies) against the npm
  # advisory database. Fails only for high/critical so routine devDep noise
  # doesn't block PRs.
  audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high or critical)
        run: pnpm audit --audit-level=high

  # ── 2. Dependency review ─────────────────────────────────────────────────────
  # On PRs, compares the base vs head lockfile and flags any newly-introduced
  # packages that have known vulnerabilities or problematic licences.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write   # allows the action to post a PR comment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Comment a summary directly on the PR
          comment-summary-in-pr: always
          # Fail on high/critical vulnerabilities introduced by the PR
          fail-on-severity: high
          # Reject packages with GPL-3.0 or other copyleft licences
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  # ── 3. CodeQL ────────────────────────────────────────────────────────────────
  # Static analysis — catches common security issues (XSS, injection, etc.)
  # in TypeScript/JavaScript source files.
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload SARIF results

    steps:
      - uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use the recommended security-extended query suite
          queries: security-extended

      # CodeQL's autobuild works for JS/TS without a compiled artefact.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
