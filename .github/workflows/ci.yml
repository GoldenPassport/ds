name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript ────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tsc --noEmit
        run: pnpm typecheck

  # ── 2. Library build ─────────────────────────────────────────────────────────
  build:
    name: Library build (tsup)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── 3. Storybook build ───────────────────────────────────────────────────────
  storybook-build:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

  # ── 4. Interaction tests (Vitest + Playwright Chromium) ──────────────────────
  storybook-tests:
    name: Interaction tests — ${{ matrix.theme }} theme
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # run both themes even if one fails
      matrix:
        include:
          - theme: light
            script: test-storybook:light
          - theme: dark
            script: test-storybook:dark

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright browsers are downloaded to ~/.cache/ms-playwright.
      # Cache the whole directory keyed on the exact Playwright version so we
      # only re-download when the version changes.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium + OS deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Chromium OS deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Storybook interaction tests (${{ matrix.theme }})
        run: pnpm ${{ matrix.script }}
