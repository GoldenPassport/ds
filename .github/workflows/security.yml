name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Re-scan weekly so newly-disclosed CVEs surface even without a code push
  schedule:
    - cron: '0 7 * * 1'   # 07:00 UTC every Monday

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Dependency audit (pnpm) ──────────────────────────────────────────────────
  # Checks every installed package against the npm advisory database.
  # Fails only for high/critical — moderate is too noisy for devDep-heavy repos.
  audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high or critical)
        run: pnpm audit --audit-level=high

  # ── CodeQL static analysis ───────────────────────────────────────────────────
  # Requires GitHub Advanced Security to be enabled on the repository:
  #   Settings → Code security → Enable "GitHub Advanced Security"
  #   then enable "CodeQL analysis".
  # For public repos this is free — visit the URL above to turn it on.
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    # CodeQL requires GitHub Advanced Security (free for public repos).
    # Enable at: Settings → Code security → GitHub Advanced Security.
    # Until then this job is best-effort and won't block CI.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
